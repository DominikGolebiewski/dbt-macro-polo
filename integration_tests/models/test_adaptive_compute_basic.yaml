version: 2

models:
- name: test_adaptive_compute_basic
  description: ""

  config:
    materialized: 'incremental'
    incremental_strategy: 'delete+insert'
    unique_key: 'id'
    timestamp_column: 'run_started_time'
    pre_hook: [ "{{ dbt_macro_polo.adaptive_compute() }}" ]

    meta:
      compute_provisioning:
        enabled: true
        execution_strategies:
          full_refresh:
            warehouse_size: m
          incremental:
            build:
              warehouse_size: s
            prune:
              warehouse_size: s
            append:
              warehouse_size: xs
