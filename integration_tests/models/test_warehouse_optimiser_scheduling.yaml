version: 2

models:
- name: test_warehouse_optimiser_scheduling
  description: "Integration test for complex scheduling configuration"

  config:
    materialized: 'incremental'
    incremental_strategy: 'delete+insert'
    unique_key: 'id'
    timestamp_column: 'run_started_time'
    pre_hook: [ "{{ dbt_macro_polo.optimise_warehouse() }}" ]

    meta:
      warehouse_optimiser:
        enabled: true
        operation_type:
          on_full_refresh:
            warehouse_size: xl
          on_run:
            ctas: 
              warehouse_size: xs
              scheduling:
                enabled: true
                schedules:
                  - name: "Peak Hours - Weekdays"
                    days: ["monday", "tuesday", "wednesday", "thursday", "friday"]
                    times:
                      start: "16:00"
                      end: "17:00"
                    warehouse_size: s 
                  - name: "Peak Hours - Weekends"
                    days: ["saturday", "sunday"]
                    times:
                      start: "06:00"
                      end: "12:00"
                    warehouse_size: xl
            delete:
              warehouse_size: xs
              scheduling:
                enabled: true
                schedules:
                  - name: "Peak Hours - Weekdays"
                    days: ["monday", "tuesday", "wednesday", "thursday", "friday"]
                    times:
                      start: "16:00"
                      end: "17:00"
                    warehouse_size: s 
                  - name: "Peak Hours - Weekends"
                    days: ["saturday", "sunday"]
                    times:
                      start: "16:00"
                      end: "17:00"
                    warehouse_size: xl
            insert:
              warehouse_size: xs
              scheduling:
                enabled: true
                schedules:
                  - name: "Peak Hours - Weekdays"
                    days: ["monday", "tuesday", "wednesday", "thursday", "friday"]
                    times:
                      start: "07:00"
                      end: "11:00"
                    warehouse_size: s 
                  - name: "Peak Hours - Weekends"
                    days: ["saturday", "sunday"]
                    times:
                      start: "06:00"
                      end: "12:00"
                    warehouse_size: xl
          on_dry_run:
            upstream_dependency: 
              - stg_act_mvt_depotstoredaycase

