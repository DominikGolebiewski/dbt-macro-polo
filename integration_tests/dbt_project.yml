name: 'dbt_macro_polo_integration_tests'
version: '1.0'

profile: 'integration_tests'

# require-dbt-version: inherit this from dbt-utils

config-version: 2

model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["data"]
seed-paths: ["data"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

require-dbt-version: [">=1.8.6", "<2.0.0"]

dispatch:
  - macro_namespace: dbt
    search_order: [ 'dbt_macro_polo_integration_tests','dbt_macro_polo', 'dbt' ]

vars:
  # DBT compatibility with legacy surrogate_key macro
  surrogate_key_treat_nulls_as_empty_strings: True
  
  # Macro Polo 
  macro_polo:
    runtime_state: {}
    observability:
        log_level: debug
    adaptive_compute:
      enabled: true
      baseline_size: xs
    infrastructure_definition:
      allowed_sizes: [ 'xs', 's', 'm', 'l', 'xl', '2xl' ]
      environment_context:
        ci:
          warehouse_name_prefix: ci
        dev:
          warehouse_name_prefix: developer
