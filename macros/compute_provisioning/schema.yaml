version: 2

macros:
  - name: provision_compute
    description: '{{ doc("provision_compute") }}'
    arguments:
      - name: incremental_size
        type: string
        description: Required. Warehouse size for incremental runs (e.g., 'xs', 's', 'm', 'l')
      - name: fullrefresh_size
        type: string
        description: Optional. Warehouse size for full-refresh runs. Defaults to incremental_size
