version: 2

macros:
  - name: log_event
    description: '{{ doc("log_event") }}'
  arguments:
  - name: message
    type: string
        description: The message content to log
  - name: level
    type: string
        description: Log level (DEBUG, INFO, WARN, ERROR)
  - name: model_id
    type: string
        description: Identifier of the model context
  - name: status
    type: string
        description: Right-aligned status indicator
      - name: macro_name
        type: string
        description: Name of the calling macro
